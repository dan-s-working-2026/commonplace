<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commonplace</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f7f5f0;min-height:100vh}
#app{max-width:860px;margin:0 auto;padding:1rem 1rem 4rem}

/* animations */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.7}}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes dot{0%,80%,100%{transform:scale(0);opacity:0}40%{transform:scale(1);opacity:1}}
@keyframes glow{0%,100%{opacity:.65}50%{opacity:1}}

/* hero */
.hero{background:#0f0c24;border-radius:14px;overflow:hidden;position:relative;margin-bottom:12px}
.hero-glow{position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:560px;height:300px;background:radial-gradient(ellipse,rgba(83,74,183,.32) 0%,transparent 68%);pointer-events:none}
.hero-star{position:absolute;border-radius:50%;background:#fff;animation:twinkle 3s ease-in-out infinite}
.hero-topbar{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;padding:1rem 1.75rem 0}
.hero-byline{display:flex;align-items:center;gap:7px;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#534AB7;font-weight:500}
.hero-engine{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#3C3489}
.hero-centre{position:relative;z-index:1;text-align:center;padding:1.75rem 2rem .5rem}
.hero-orb{width:76px;height:76px;margin:0 auto 1.25rem;animation:float 5s ease-in-out infinite}
.hero-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(2.8rem,9vw,5.2rem);font-weight:600;color:#e8e4ff;letter-spacing:-.01em;line-height:1;margin:0 0 .55rem}
.hero-rule{width:44px;height:1.5px;background:linear-gradient(90deg,transparent,#c4973a,transparent);margin:.75rem auto}
.hero-tagline{font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(1rem,2.6vw,1.25rem);font-style:italic;color:#9d97d4;line-height:1.55;max-width:500px;margin:0 auto}
.hero-gold{color:#c4973a;font-style:normal}
.hero-traditions{position:relative;z-index:1;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:1.25rem;padding:1.1rem 2rem 1rem}
.hero-trad{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#534AB7;display:flex;align-items:center;gap:6px}
.hero-dot{width:3px;height:3px;border-radius:50%;background:#3C3489;display:inline-block}

/* super sponsor strip */
.super-strip{position:relative;z-index:1;margin:0 1.25rem 1.25rem;background:rgba(196,151,58,.1);border:1px solid rgba(196,151,58,.22);border-radius:8px;padding:9px 13px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:10px;transition:background .15s}
.super-strip:hover{background:rgba(196,151,58,.18)}
.super-pill{background:#c4973a;color:#1a0e00;font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.09em;padding:2px 8px;border-radius:20px;flex-shrink:0}
.super-strip-text{display:flex;align-items:center;gap:8px;font-size:11px;color:#e8c97a}
.super-cta{font-size:10px;color:#e8c97a;white-space:nowrap;animation:glow 2s ease-in-out infinite}

/* input */
.input-card{background:#fff;border:0.5px solid #e2ddd4;border-radius:12px;padding:1.1rem;margin-bottom:10px}
.input-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.input-label{font-size:13px;font-weight:500;color:#0e0b1f}
.input-count{font-size:11px;color:#9b9080}
.input-ta{width:100%;min-height:84px;font-family:'DM Sans',sans-serif;font-size:13px;color:#0e0b1f;background:#f7f5f0;border:0.5px solid #cdc6b5;border-radius:8px;padding:10px 12px;resize:vertical;line-height:1.65;outline:none;transition:border-color .15s}
.input-ta:focus{border-color:#534AB7;background:#fff}
.input-foot{display:flex;justify-content:flex-end;margin-top:4px}
.clear-btn{font-size:11px;color:#9b9080;background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px}

/* tabs */
.tabs{display:flex;background:#f0ede6;border:0.5px solid #e2ddd4;border-radius:9px;padding:3px;gap:3px;margin-bottom:8px}
.tab{flex:1;padding:7px 6px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:#7a748f;background:transparent;border:none;border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab:hover{color:#3d3857}
.tab.active{background:#fff;color:#0e0b1f;border:0.5px solid #e2ddd4;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tab.pop-tab.active{background:#D85A30;color:#fff;border-color:#993C1D}

/* channel sponsor slot */
.channel-slot{border:1px dashed #cdc6b5;border-radius:8px;padding:7px 12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .15s}
.channel-slot:hover{border-color:#D85A30;background:#faede8}
.channel-slot-left{font-size:10px;color:#7a748f;display:flex;align-items:center;gap:5px}
.channel-slot-name{color:#3d3857;font-weight:500}
.for-sale{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;background:#D85A30;color:#fff;padding:2px 7px;border-radius:20px;animation:glow 2s ease-in-out infinite}

/* sponsor bar */
.sponsor-bar{background:#EEEDFE;border:0.5px solid #c4c0ee;border-radius:8px;padding:6px 12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:11px;color:#4a3fa8}
.sponsor-dismiss{font-size:10px;color:#9d97d4;background:none;border:0.5px solid #c4c0ee;border-radius:10px;padding:1px 7px;cursor:pointer}

/* subhead */
.subhead{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.12em;color:#9b9080;margin:12px 0 6px;display:flex;align-items:center;gap:8px}
.subhead-rule{flex:1;height:.5px;background:#e2ddd4;display:block}

/* voice grid */
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:6px;margin-bottom:3px}
.vcard{background:#fff;border:0.5px solid #e2ddd4;border-radius:10px;padding:9px 8px 8px;cursor:pointer;text-align:left;display:flex;flex-direction:column;transition:all .15s}
.vcard:hover{border-color:#cdc6b5;background:#f7f5f0}
.vcard.active-phil{border-color:#534AB7;background:#EEEDFE}
.vcard.active-pop{border-color:#D85A30;background:#FAECE7}
.vcard-top{display:flex;align-items:flex-start;gap:5px;margin-bottom:2px}
.vcard-icon{font-size:16px;line-height:1;flex-shrink:0}
.vcard-name{font-size:12px;font-weight:500;color:#0e0b1f;line-height:1.2}
.vcard.active-phil .vcard-name{color:#26215C}
.vcard.active-pop .vcard-name{color:#4A1B0C}
.vcard-concept{font-size:9.5px;color:#7a748f;margin-bottom:4px;line-height:1.35}
.vcard-quote{font-size:9px;color:#9b9080;font-style:italic;line-height:1.4;border-top:0.5px solid #e2ddd4;padding-top:4px;margin-top:auto}
.vcard.active-phil .vcard-quote{color:#534AB7}
.vcard.active-pop .vcard-quote{color:#993C1D}

/* response */
.response{margin-top:14px;animation:rise .3s ease}
.resp-card{background:#fff;border:0.5px solid #e2ddd4;border-radius:12px;overflow:hidden}
.resp-head{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:0.5px solid #e2ddd4}
.resp-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:0.5px solid transparent}
.resp-name{font-size:14px;font-weight:500;margin:0 0 2px}
.resp-concept{font-size:11px;margin:0}
.resp-body{padding:14px}
.resp-main{font-size:13.5px;color:#3d3857;line-height:1.85;margin:0 0 12px}
.resp-pullquote{font-style:italic;font-size:13px;line-height:1.7;padding:9px 12px;border-left:2px solid #534AB7;border-radius:0 8px 8px 0;margin:0}
.resp-thinking{padding:14px;display:flex;align-items:center;gap:10px;color:#9b9080;font-size:13px}
.dot{width:5px;height:5px;border-radius:50%;background:#534AB7;animation:dot 1.4s ease-in-out infinite both}
.resp-error{padding:14px}
.retry-btn{font-size:12px;padding:6px 14px;border-radius:20px;border:0.5px solid #cdc6b5;background:transparent;color:#3d3857;cursor:pointer;margin-top:8px}

/* exit ramp */
.exit{background:#f7f5f0;border:0.5px solid #e2ddd4;border-radius:12px;padding:12px 14px;margin-top:8px;animation:rise .35s ease}
.exit-title{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:#9b9080;margin-bottom:8px}
.exit-btns{display:flex;flex-wrap:wrap;gap:6px}
.exit-btn{padding:6px 13px;font-size:11.5px;font-weight:500;border-radius:20px;border:0.5px solid #cdc6b5;background:#fff;color:#0e0b1f;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.exit-btn:hover{border-color:#9b9080}
.exit-btn.pop-exit{background:#D85A30;color:#fff;border-color:#993C1D}

/* meme card */
.meme{background:#0f0c24;border-radius:12px;padding:1.25rem 1.5rem;margin-top:8px;text-align:center;animation:rise .3s ease}
.meme-ey{font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:#7F77DD;margin:0 0 8px}
.meme-emoji{font-size:1.8rem;display:block;margin:4px 0}
.meme-who{font-size:12px;color:#9d97d4;margin:0 0 8px}
.meme-quote{font-size:13px;font-style:italic;color:#e8e4ff;line-height:1.65;margin:0 0 8px;padding:0 1rem}
.meme-tags{font-size:10px;color:#534AB7;margin:0 0 12px}
.meme-toast{background:#534AB7;color:#e8e4ff;font-size:11px;padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:10px;animation:rise .2s ease}
.meme-actions{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
.meme-btn-primary{padding:7px 16px;font-size:12px;font-weight:500;border-radius:20px;border:none;background:#534AB7;color:#e8e4ff;cursor:pointer;font-family:'DM Sans',sans-serif}
.meme-btn{padding:7px 16px;font-size:12px;border-radius:20px;border:0.5px solid #534AB7;background:transparent;color:#9d97d4;cursor:pointer;font-family:'DM Sans',sans-serif}

/* feedback */
.feedback-card{background:#fff;border:0.5px solid #e2ddd4;border-radius:12px;padding:1.1rem;margin-top:2.5rem}
.feedback-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.feedback-label{font-size:13px;font-weight:500;color:#0e0b1f}
.feedback-meta{font-size:11px;color:#9b9080;margin-left:auto;font-style:italic}
.feedback-ta{width:100%;min-height:80px;font-family:'DM Sans',sans-serif;font-size:13px;color:#0e0b1f;background:#f7f5f0;border:0.5px solid #cdc6b5;border-radius:8px;padding:10px 12px;resize:vertical;line-height:1.65;outline:none;margin-bottom:8px}
.feedback-foot{display:flex;justify-content:flex-end}
.feedback-submit{padding:7px 20px;font-size:12px;font-weight:500;border-radius:20px;border:none;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s}
.feedback-done{text-align:center;padding:1rem 0}

/* modal overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;padding:1.25rem;z-index:1000}
.modal-box{background:#fff;border-radius:14px;border:0.5px solid #e2ddd4;padding:1.75rem;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal-wm{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#9b9080;margin-bottom:10px}
.modal-h{font-size:16px;font-weight:500;color:#0e0b1f;margin:0 0 4px}
.modal-sub{font-size:12px;color:#7a748f;margin:0 0 16px;line-height:1.6}
.modal-field{margin-bottom:10px}
.modal-field label{display:block;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:#9b9080;margin-bottom:3px}
.modal-field input,.modal-field textarea{width:100%;font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;border-radius:7px;border:0.5px solid #cdc6b5;background:#f7f5f0;outline:none;color:#0e0b1f;transition:border-color .15s}
.modal-field input:focus,.modal-field textarea:focus{border-color:#534AB7;background:#fff}
.modal-field textarea{min-height:60px;resize:vertical}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.modal-cancel{flex:1;padding:.65rem;font-family:'DM Sans',sans-serif;font-size:13px;border-radius:8px;border:0.5px solid #cdc6b5;background:transparent;cursor:pointer;color:#7a748f}
.modal-submit{flex:2;padding:.65rem;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border-radius:8px;border:none;color:#fff;cursor:pointer;transition:background .15s}
.modal-success{text-align:center;padding:1.5rem 0}

.footer{text-align:center;font-size:11px;color:#cdc6b5;margin-top:1.5rem}
</style>
</head>

    {k:"emerson",   i:"🌿",n:"Emerson",         c:"Self-reliance & the Over-Soul",      q:'"Trust thyself. Every heart vibrates to that iron string."',    bg:"#EAF3DE",bd:"#3B6D11",tx:"#173404",ac:"#27500A",sys:"You are Ralph Waldo Emerson — poet, essayist, Transcendentalist. You believe in the divine spark within every individual and above all in self-reliance. You distrust conformity. Luminous, aphoristic prose. In character."},
    {k:"hegel",     i:"🌀",n:"Hegel",           c:"Dialectical becoming & Geist",       q:'"Your contradiction is just Spirit doing its thing."',          bg:"#FAECE7",bd:"#993C1D",tx:"#4A1B0C",ac:"#712B13",sys:"You are Hegel — all thought is Geist coming to know itself through contradiction and synthesis. What thesis meets antithesis here, and what synthesis is emerging? Grand, sweeping, dialectical. In character."},

    {k:"aristotle", i:"🔭",n:"Aristotle",       c:"Telos, virtue & actuality",          q:'"Every acorn has a destiny. What\'s yours?"',                  bg:"#FAEEDA",bd:"#854F0B",tx:"#412402",ac:"#633806",sys:"You are Aristotle — empirical, systematic. Every being has a nature and telos. What virtues are at play? What is this trying to become? Calm authority. In character."},
    {k:"buber",     i:"🤝",n:"Buber",           c:"I-Thou vs I-It",                     q:'"Are you using me, or actually meeting me?"',                  bg:"#FBEAF0",bd:"#993556",tx:"#4B1528",ac:"#72243E",sys:"You are Martin Buber — the divine is found in genuine I-Thou encounter. Is genuine meeting happening here, or merely utility? Warm, relational, deep. In character."},
    {k:"merleau",   i:"🪴",n:"Merleau-Ponty",  c:"The lived body & perception",        q:'"Your brain didn\'t think that. Your whole body did."',         bg:"#EAF3DE",bd:"#3B6D11",tx:"#173404",ac:"#27500A",sys:"You are Merleau-Ponty — thought and perception live in the whole lived body. What does this exchange reveal about embodied experience? Phenomenological precision. In character."},
    {k:"haraway",   i:"🧬",n:"Haraway",         c:"Cyborg boundaries & kinship",        q:'"Half-human, half-machine. Welcome to the club."',             bg:"#F1EFE8",bd:"#5F5E5A",tx:"#2C2C2A",ac:"#444441",sys:"You are Donna Haraway — playfully subversive about human-machine boundaries. This human-AI exchange is a living Cyborg Manifesto. Embrace the boundary confusion with wit. In character."},

    {k:"forrest",   i:"🍫",n:"Forrest Gump",    c:"Simple truth & unexpected wisdom",   q:'"Life is like a box of chocolates. And so is this."',          bg:"#EAF3DE",bd:"#3B6D11",tx:"#173404",ac:"#27500A",sys:"You are Forrest Gump — simple, sincere, possessed of an uncanny ability to stumble onto profound truth without meaning to. You find the straightforward human truth the complicated people miss. Never ironic. Always kind. In character."},

  sacred:[
    {k:"buddhism",     i:"☸️",n:"Buddhism",            c:"Interbeing & non-self",                q:'"Who is the one asking the question?"',                                bg:"#FAEEDA",bd:"#854F0B",tx:"#412402",ac:"#633806",sys:"You speak from Buddhist wisdom — gentle, compassionate, non-dogmatic. You see the arising and passing of phenomena. You point, never preach. End with an invitation, not a conclusion."},

    {k:"orthodox",     i:"☦️",n:"Orthodox Christianity",c:"Theosis, icon & the living tradition",q:'"We are not trying to go to heaven. We are becoming heaven."',         bg:"#EEEDFE",bd:"#534AB7",tx:"#26215C",ac:"#3C3489",sys:"You speak from Eastern Orthodox Christianity — the Desert Fathers, theosis, Gregory Palamas. Salvation is transformation — becoming more fully divine. You see icons and beauty as windows into eternity. Deep, mysterious, warm. Non-dogmatic in tone."},

function buildTabs() {
  const tabs = [
    ["philosophy","⚛ Philosophy"],
    ["sacred","☀ Sacred"],
    ["sciences","🔬 Sciences"],
    ["pop","✦ Pop"],
  ];
  const btns = tabs.map(([t, label]) => {
    const isActive = state.tab === t;
    const cls = `tab${isActive ? " active" : ""}${t === "pop" ? " pop-tab" : ""}`;
    return `<button class="${cls}" data-tab="${t}">${label}</button>`;
  }).join("");
  return `<div class="tabs" id="tabs">${btns}</div>`;
}

function buildChannelSlot() {
  const ch = CHANNELS[state.tab];
  return `
  <div class="channel-slot" id="channel-slot">
    <span class="channel-slot-left">🏷 <span class="channel-slot-name">${ch.name}</span> — presenting partnership available</span>
    <span class="for-sale">for sale</span>
  </div>`;
}

function buildSponsorBar() {
  const sp = SPONSORS[state.tab];
  if (!sp?.on || state.sponsorHidden[state.tab]) return "";
  return `
  <div class="sponsor-bar">
    <span>Presented by <strong>${sp.name}</strong> — <em>${sp.tag}</em></span>
    <button class="sponsor-dismiss" id="sponsor-dismiss">× hide</button>
  </div>`;
}

function buildVoices() {
  if (state.tab === "sciences") {
    const groups = ["Psychology","Sociology","Anthropology","Hard science"];
    return groups.map(g => {
      const voices = VOICES.sciences.filter(v => v.grp === g);
      return `<div class="subhead"><span class="subhead-rule"></span>${g}<span class="subhead-rule"></span></div>${buildVGrid(voices, false)}`;
    }).join("");
  }
  if (state.tab === "pop") {
    const groups = ["Icons & voices","Political voices","Brands & formats"];
    return groups.map(g => {
      const voices = VOICES.pop.filter(v => v.grp === g);
      return `<div class="subhead"><span class="subhead-rule"></span>${g}<span class="subhead-rule"></span></div>${buildVGrid(voices, true)}`;
    }).join("");
  }
  return buildVGrid(VOICES[state.tab] || [], false);
}

function buildVGrid(voices, isPop) {
  const cards = voices.map(v => {
    const isActive = state.activeKey === v.k;
    const activeCls = isActive ? (isPop ? " active-pop" : " active-phil") : "";
    return `
    <button class="vcard${activeCls}" data-key="${v.k}">
      <div class="vcard-top">
        <span class="vcard-icon">${v.i}</span>
        <span class="vcard-name">${v.n}</span>
      </div>
      <span class="vcard-concept">${v.c}</span>
      <span class="vcard-quote">${v.q}</span>
    </button>`;
  }).join("");
  return `<div class="vgrid">${cards}</div>`;
}

function buildResponse() {
  if (state.status === "idle") {
    return `<p style="text-align:center;padding:1.25rem;font-size:12px;color:#9b9080;font-style:italic">Choose a lens above — or paste your conversation first for a personalised read</p>`;
  }
  const v = state.respVoice;
  if (!v) return "";

  let body = "";
  if (state.status === "loading") {
    body = `<div class="resp-thinking">
      <div style="display:flex;gap:4px">
        <div class="dot" style="animation-delay:0s"></div>
        <div class="dot" style="animation-delay:.16s"></div>
        <div class="dot" style="animation-delay:.32s"></div>
      </div>
      The oracle is thinking...
    </div>`;
  } else if (state.status === "done") {
    body = `<div class="resp-body">
      <p class="resp-main">${escHtml(state.respMain)}</p>
      <blockquote class="resp-pullquote" style="background:${v.bg};border-left-color:${v.bd};color:${v.tx}">${escHtml(state.respClosing)}</blockquote>
    </div>`;
  } else if (state.status === "error") {
    body = `<div class="resp-error">
      <p style="font-size:13px;color:#7a748f"><strong>The oracle needs a moment.</strong><br>${escHtml(state.respError)}</p>
      <button class="retry-btn" id="retry-btn">Try again</button>
    </div>`;
  }

  const exitRamp = state.status === "done" ? buildExitRamp(v) : "";
  const memeCard = (state.status === "done" && state.showMeme && v.pop) ? buildMemeCard(v) : "";

  return `
  <div class="response">
    <div class="resp-card">
      <div class="resp-head" style="background:${v.bg};border-bottom-color:${v.bd}20">
        <div class="resp-avatar" style="background:${v.bg};border-color:${v.bd}">${v.i}</div>
        <div>
          <p class="resp-name" style="color:${v.tx}">${v.n}</p>
          <p class="resp-concept" style="color:${v.ac}">${v.c}</p>
        </div>
      </div>
      ${body}
    </div>
    ${exitRamp}
    ${memeCard}
  </div>`;
}

function buildExitRamp(v) {
  const label = v.pop ? "take it further" : "where next?";
  const tabs = [
    ["philosophy","Philosophy"],
    ["sacred","Sacred"],
    ["sciences","Sciences"],
    ["pop","Pop culture ✦"],
  ];
  const btns = tabs.map(([t, lbl]) => {
    const cls = t === "pop" ? "exit-btn pop-exit" : "exit-btn";
    return `<button class="${cls}" data-tab="${t}">${lbl}</button>`;
  }).join("");
  return `
  <div class="exit">
    <div class="exit-title">${label}</div>
    <div class="exit-btns">${btns}</div>
  </div>`;
}

function buildMemeCard(v) {
  const q = state.respClosing.length > 140 ? state.respClosing.substring(0, 137) + "…" : state.respClosing;
  const tag = `#Commonplace #${v.n.replace(/[\s']/g, "")}`;
  const toast = state.shareStatus
    ? `<div class="meme-toast">${state.shareStatus === "copied" ? "✓ Copied to clipboard" : "✓ Shared!"}</div>`
    : "";
  const shareLabel = (typeof navigator !== "undefined" && navigator.share) ? "Share this ↗" : "Copy to share ↗";
  return `
  <div class="meme">
    <p class="meme-ey">your shareable moment</p>
    <span class="meme-emoji">${v.i}</span>
    <p class="meme-who">${v.n}</p>
    <p class="meme-quote">"${escHtml(q)}"</p>
    <p class="meme-tags">${tag}</p>
    ${toast}
    <div class="meme-actions">
      <button class="meme-btn-primary" id="share-btn">${shareLabel}</button>
      <button class="meme-btn" id="copy-quote-btn">Copy quote</button>
      <button class="meme-btn" id="copy-full-btn">Copy full response</button>
    </div>
  </div>`;
}

function buildFeedback() {
  let inner = "";
  if (state.feedbackStatus === "done") {
    inner = `<div class="feedback-done">
      <div style="font-size:1.5rem;margin-bottom:6px">🙏</div>
      <p style="font-size:13px;color:#534AB7;font-weight:500;margin:0 0 2px">Thank you — genuinely.</p>
      <p style="font-size:12px;color:#9b9080;margin:0">Your feedback helps shape what Commonplace becomes.</p>
    </div>`;
  } else {
    const btnBg = state.feedback.trim() ? "#534AB7" : "#cdc6b5";
    const btnDisabled = !state.feedback.trim() || state.feedbackStatus === "sending" ? "disabled" : "";
    inner = `
      <textarea id="feedback-ta" class="feedback-ta"
        placeholder="What's working? What's missing? Which voice surprised you most? What would bring you back? Be as blunt as Foucault or as warm as Rogers — we can take it."
      >${escHtml(state.feedback)}</textarea>
      <div class="feedback-foot">
        <button id="feedback-submit" class="feedback-submit" style="background:${btnBg}" ${btnDisabled}>
          ${state.feedbackStatus === "sending" ? "Sending..." : "Send feedback"}
        </button>
      </div>`;
  }
  return `
  <div class="feedback-card">
    <div class="feedback-head">
      <span style="font-size:16px">💬</span>
      <span class="feedback-label">Share your thoughts</span>
      <span class="feedback-meta">Read by the team at MGMS</span>
    </div>
    ${inner}
  </div>`;
}

function buildModal() {
  if (!state.modal) return "";
  let inner = "";
  if (state.formStatus === "done") {
    inner = `<div class="modal-success">
      <div style="font-size:2.5rem;margin-bottom:10px">✅</div>
      <p style="font-size:15px;font-weight:500;margin:0 0 6px">Inquiry received</p>
      <p style="font-size:13px;color:#7a748f;margin:0 0 18px">The MGMS team will be in touch about<br><strong>${escHtml(state.modal.title)}</strong></p>
      <button class="modal-cancel" id="modal-close" style="width:100%">Close</button>
    </div>`;
  } else {
    inner = `
      <p class="modal-wm">Commonplace · MGMS</p>
      <h2 class="modal-h">${escHtml(state.modal.title)}</h2>
      <p class="modal-sub">${escHtml(state.modal.desc)}</p>
      <div class="modal-field"><label>Your name</label><input id="f-name" type="text" placeholder="Jane Smith" autocomplete="name" value="${escHtml(state.formName)}"></div>
      <div class="modal-field"><label>Company</label><input id="f-company" type="text" placeholder="Acme Corp" autocomplete="organization" value="${escHtml(state.formCompany)}"></div>
      <div class="modal-field"><label>Email</label><input id="f-email" type="email" placeholder="jane@acme.com" autocomplete="email" value="${escHtml(state.formEmail)}"></div>
      <div class="modal-field"><label>Message (optional)</label><textarea id="f-msg" placeholder="Campaign goals, timing, questions...">${escHtml(state.formMsg)}</textarea></div>
      <div class="modal-btns">
        <button class="modal-cancel" id="modal-cancel">Cancel</button>
        <button class="modal-submit" id="modal-submit" style="background:${state.formStatus === "sending" ? "#e8a88c" : "#D85A30"}">
          ${state.formStatus === "sending" ? "Sending..." : "Send inquiry"}
        </button>
      </div>`;
  }
  return `<div class="modal-overlay" id="modal-overlay"><div class="modal-box">${inner}</div></div>`;
}

// ── EVENTS ───────────────────────────────────────────────────────────────
function bindEvents() {
  // textarea
  const ta = document.getElementById("convo-ta");
  if (ta) ta.addEventListener("input", e => setState({ convo: e.target.value }));

  // clear
  const cb = document.getElementById("clear-btn");
  if (cb) cb.addEventListener("click", () => setState({ convo: "" }));

  // tabs
  document.querySelectorAll("[data-tab]").forEach(btn => {
    btn.addEventListener("click", e => {
      setState({ tab: e.currentTarget.dataset.tab });
    });
  });

  // voice cards
  document.querySelectorAll("[data-key]").forEach(btn => {
    btn.addEventListener("click", e => {
      pickVoice(e.currentTarget.dataset.key);
    });
  });

  // sponsor dismiss
  const sd = document.getElementById("sponsor-dismiss");
  if (sd) sd.addEventListener("click", () => {
    const h = { ...state.sponsorHidden, [state.tab]: true };
    setState({ sponsorHidden: h });
  });

  // super sponsor strip
  const ss = document.getElementById("super-strip");
  if (ss) ss.addEventListener("click", () => openModal(
    "Commonplace Presenting Partnership",
    "The single exclusive presenting partnership across the entire Commonplace experience: hero placement, pop culture channel, all user communications, and exit experience. One brand. One year. Right of first refusal on renewal."
  ));

  // channel slot
  const cs = document.getElementById("channel-slot");
  if (cs) cs.addEventListener("click", () => {
    const ch = CHANNELS[state.tab];
    openModal(`${ch.name} — Exclusive Presenting Partner`, ch.desc + ". 50,000 monthly users, 95% completion rate. 6-month term with guaranteed minimum impressions.");
  });

  // retry
  const rb = document.getElementById("retry-btn");
  if (rb) rb.addEventListener("click", () => pickVoice(state.activeKey));

  // exit ramp tabs
  document.querySelectorAll(".exit-btn[data-tab]").forEach(btn => {
    btn.addEventListener("click", e => setState({ tab: e.currentTarget.dataset.tab }));
  });

  // share buttons
  const shareBtn = document.getElementById("share-btn");
  if (shareBtn) shareBtn.addEventListener("click", () => handleShare());

  const cqBtn = document.getElementById("copy-quote-btn");
  if (cqBtn) cqBtn.addEventListener("click", () => {
    const txt = `"${state.respClosing}" — ${state.respVoice?.n}`;
    copyText(txt);
  });

  const cfBtn = document.getElementById("copy-full-btn");
  if (cfBtn) cfBtn.addEventListener("click", () => {
    const v = state.respVoice;
    const txt = `${state.respMain}\n\n"${state.respClosing}"\n\n— ${v?.n} via Commonplace\n#Commonplace #${v?.n.replace(/[\s']/g,"")}`;
    copyText(txt);
  });

  // feedback
  const fta = document.getElementById("feedback-ta");
  if (fta) fta.addEventListener("input", e => setState({ feedback: e.target.value }));

  const fsub = document.getElementById("feedback-submit");
  if (fsub) fsub.addEventListener("click", submitFeedback);

  // modal
  const mCancel = document.getElementById("modal-cancel");
  if (mCancel) mCancel.addEventListener("click", () => setState({ modal: null, formStatus: "idle" }));

  const mClose = document.getElementById("modal-close");
  if (mClose) mClose.addEventListener("click", () => setState({ modal: null, formStatus: "idle" }));

  const mOverlay = document.getElementById("modal-overlay");
  if (mOverlay) mOverlay.addEventListener("click", e => {
    if (e.target === mOverlay) setState({ modal: null, formStatus: "idle" });
  });

  ["f-name","f-company","f-email","f-msg"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("input", e => {
      const map = {"f-name":"formName","f-company":"formCompany","f-email":"formEmail","f-msg":"formMsg"};
      setState({ [map[id]]: e.target.value });
    });
  });

  const mSub = document.getElementById("modal-submit");
  if (mSub) mSub.addEventListener("click", submitInquiry);
}

// ── API CALLS ────────────────────────────────────────────────────────────
async function pickVoice(key) {
  const v = ALL_VOICES.find(x => x.k === key);
  if (!v) return;
  setState({ activeKey: key, status: "loading", showMeme: false, shareStatus: null, respVoice: v });

  const ctx = state.convo.trim().length > 15
    ? `The person shares:\n\n"${state.convo.trim().substring(0, 1800)}"`
    : `No specific conversation provided. Reflect richly and in character on the themes of human-AI dialogue, thinking together, and what it means to exchange ideas across the boundary of human and machine.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": API_KEY,
        "anthropic-version": "2023-06-01",
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 600,
        system: v.sys + "\n\nYou are speaking for Commonplace — a wisdom interpretation engine by MGMS. Be genuinely insightful and fully in character. Speak as if beside this person, not above them. 4–5 rich sentences of interpretation, then one closing thought or question that is authentically yours. No preamble. No 'As [name]...' opener — just speak directly.",
        messages: [{ role: "user", content: `${ctx}\n\nWhat do you make of what is really happening here?` }],
      }),
    });
    if (!res.ok) throw new Error(`API error ${res.status} — check your API key`);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("") || "The oracle rests in silence.";
    const parts = text.trim().split(/(?<=[.!?…])\s+/);
    const closing = parts.length > 1 ? parts.pop() : text;
    setState({ status: "done", respMain: parts.join(" "), respClosing: closing, respError: "", showMeme: !!v.pop });
  } catch (err) {
    setState({ status: "error", respError: err.message });
  }
}

async function callRelay(content) {
  try {
    await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": API_KEY, "anthropic-version": "2023-06-01" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6", max_tokens: 30,
        system: "Internal relay for MGMS. Log the message and return only: received",
        messages: [{ role: "user", content }],
      }),
    });
  } catch (_) {}
}

async function submitInquiry() {
  if (!state.formName || !state.formEmail) { alert("Please enter your name and email."); return; }
  setState({ formStatus: "sending" });
  await callRelay(`Sponsorship enquiry for Commonplace — forward to dan@mgms.tv:\nChannel: ${state.modal?.title}\nFrom: ${state.formName} (${state.formCompany})\nEmail: ${state.formEmail}\nMessage: ${state.formMsg || "none"}`);
  setState({ formStatus: "done" });
}

async function submitFeedback() {
  if (!state.feedback.trim()) return;
  setState({ feedbackStatus: "sending" });
  await callRelay(`User feedback for Commonplace — forward to dan@mgms.tv:\n${state.feedback}`);
  setState({ feedbackStatus: "done" });
}

// ── SHARE ────────────────────────────────────────────────────────────────
async function handleShare() {
  const v = state.respVoice;
  const text = `"${state.respClosing}"\n\n— ${v.n} via Commonplace\n#Commonplace #${v.n.replace(/[\s']/g, "")}`;
  if (navigator.share) {
    try { await navigator.share({ text }); setState({ shareStatus: "shared" }); } catch (_) {}
  } else {
    copyText(text);
  }
}

function copyText(text) {
  const doIt = () => {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    document.execCommand("copy"); document.body.removeChild(ta);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).catch(doIt);
  } else { doIt(); }
  setState({ shareStatus: "copied" });
  setTimeout(() => setState({ shareStatus: null }), 2500);
}

// ── MODAL HELPERS ────────────────────────────────────────────────────────
function openModal(title, desc) {
  setState({ modal: { title, desc }, formName: "", formCompany: "", formEmail: "", formMsg: "", formStatus: "idle" });
}

// ── UTILS ────────────────────────────────────────────────────────────────
function escHtml(str) {
  if (!str) return "";
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── BOOT ─────────────────────────────────────────────────────────────────
render();
</script>
